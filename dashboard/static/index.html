<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Safety Monitor — Live camera feed and incident dashboard">
    <title>Safety Monitor Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #0a0e17;
            --bg-card: #111827;
            --bg-card-hover: #1a2233;
            --border: #1e293b;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #3b82f6;
            --accent-blue-glow: rgba(59, 130, 246, 0.15);
            --color-silent: #475569;
            --color-flag: #f59e0b;
            --color-flag-bg: rgba(245, 158, 11, 0.1);
            --color-alert: #ef4444;
            --color-alert-bg: rgba(239, 68, 68, 0.1);
            --color-ack: #22c55e;
            --color-fp: #a855f7;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 4px 24px rgba(0,0,0,0.3);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
        }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 28px;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }
        .header h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-stats {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .stat-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-secondary);
            padding: 4px 12px;
            background: rgba(255,255,255,0.04);
            border-radius: 20px;
            border: 1px solid var(--border);
        }
        .stat-chip .count {
            font-weight: 600;
            color: var(--text-primary);
        }
        .ws-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--color-alert);
            transition: background 0.3s;
        }
        .ws-indicator.connected { background: var(--color-ack); }

        /* ── Alert Banner ── */
        .alert-banner {
            display: none;
            padding: 12px 28px;
            background: linear-gradient(90deg, rgba(239,68,68,0.15), rgba(239,68,68,0.05));
            border-bottom: 1px solid rgba(239,68,68,0.3);
            color: var(--color-alert);
            font-weight: 600;
            font-size: 14px;
            animation: pulse-bg 1.5s ease-in-out infinite;
            align-items: center;
            gap: 10px;
        }
        .alert-banner.visible { display: flex; }
        @keyframes pulse-bg {
            0%, 100% { background: linear-gradient(90deg, rgba(239,68,68,0.15), rgba(239,68,68,0.05)); }
            50% { background: linear-gradient(90deg, rgba(239,68,68,0.25), rgba(239,68,68,0.1)); }
        }

        /* ── Layout ── */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px 28px;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* ── Cards ── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.02);
        }
        .card-header h2 {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
        }
        .card-header .badge {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 20px;
            color: #fff;
        }

        /* ── Feed ── */
        .feed-card { grid-column: 1; }
        .feed-container {
            position: relative;
            background: #000;
            aspect-ratio: 4/3;
        }
        .feed-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        .feed-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            display: flex;
            gap: 8px;
        }
        .feed-badge {
            font-size: 11px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 6px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            color: var(--color-ack);
            border: 1px solid rgba(34,197,94,0.3);
        }

        /* ── Incident Table ── */
        .incidents-card { grid-column: 2; grid-row: 1 / 3; max-height: calc(100vh - 120px); display: flex; flex-direction: column; }
        .table-container {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        thead { position: sticky; top: 0; z-index: 5; }
        thead th {
            padding: 10px 14px;
            text-align: left;
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
        }
        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }
        tbody tr:hover { background: var(--bg-card-hover); }
        tbody td {
            padding: 10px 14px;
            vertical-align: middle;
        }
        .empty-row td {
            text-align: center;
            color: var(--text-muted);
            padding: 40px 14px;
        }

        /* severity badges */
        .severity-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }
        .severity-badge.silent {
            background: rgba(71,85,105,0.2);
            color: var(--color-silent);
            border: 1px solid rgba(71,85,105,0.3);
        }
        .severity-badge.flag {
            background: var(--color-flag-bg);
            color: var(--color-flag);
            border: 1px solid rgba(245,158,11,0.3);
        }
        .severity-badge.alert {
            background: var(--color-alert-bg);
            color: var(--color-alert);
            border: 1px solid rgba(239,68,68,0.3);
        }

        /* row tint for flag/alert */
        tr.row-flag { background: rgba(245,158,11,0.04); }
        tr.row-alert { background: rgba(239,68,68,0.04); }
        tr.row-ack { opacity: 0.5; }

        /* action buttons */
        .actions { display: flex; gap: 6px; }
        .btn {
            padding: 4px 10px;
            border: none;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            letter-spacing: 0.02em;
        }
        .btn:disabled { opacity: 0.3; cursor: default; }
        .btn-ack {
            background: rgba(34,197,94,0.12);
            color: var(--color-ack);
            border: 1px solid rgba(34,197,94,0.25);
        }
        .btn-ack:hover:not(:disabled) {
            background: rgba(34,197,94,0.25);
        }
        .btn-fp {
            background: rgba(168,85,247,0.12);
            color: var(--color-fp);
            border: 1px solid rgba(168,85,247,0.25);
        }
        .btn-fp:hover:not(:disabled) {
            background: rgba(168,85,247,0.25);
        }

        /* ── Stats row ── */
        .stats-card { grid-column: 1; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: var(--border);
        }
        .stat-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: var(--bg-card);
        }
        .stat-box .value {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-box .label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* ── Responsive ── */
        @media (max-width: 1024px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            .incidents-card { grid-column: 1; grid-row: auto; max-height: 500px; }
        }

        /* scrollbar */
        .table-container::-webkit-scrollbar { width: 6px; }
        .table-container::-webkit-scrollbar-track { background: transparent; }
        .table-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <h1>⚡ Safety Monitor</h1>
        <div class="header-stats">
            <div class="stat-chip">
                <span>Incidents</span>
                <span class="count" id="header-incidents">0</span>
            </div>
            <div class="stat-chip">
                <span>Alerts</span>
                <span class="count" id="header-alerts">0</span>
            </div>
            <div class="stat-chip">
                <div class="ws-indicator" id="ws-status"></div>
                <span id="ws-label">Disconnected</span>
            </div>
        </div>
    </header>

    <!-- Alert Banner -->
    <div class="alert-banner" id="alert-banner">
        <span>🚨</span>
        <span id="alert-banner-text">ALERT — High severity incident detected</span>
    </div>

    <!-- Dashboard Grid -->
    <main class="dashboard">

        <!-- Live Feed -->
        <section class="card feed-card">
            <div class="card-header">
                <h2>Live Feed</h2>
                <span class="feed-badge" id="feed-status">● LIVE</span>
            </div>
            <div class="feed-container">
                <img id="feed-img" src="/feed" alt="Live camera feed">
            </div>
        </section>

        <!-- Incident Table -->
        <section class="card incidents-card">
            <div class="card-header">
                <h2>Incidents</h2>
                <span class="badge" style="background: var(--accent-blue);" id="incident-count-badge">0</span>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Type</th>
                            <th>Score</th>
                            <th>Camera</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="incident-tbody">
                        <tr class="empty-row"><td colspan="5">No incidents recorded yet</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Stats -->
        <section class="card stats-card">
            <div class="card-header">
                <h2>Statistics</h2>
            </div>
            <div class="stats-grid">
                <div class="stat-box">
                    <span class="value" id="stat-incidents">0</span>
                    <span class="label">Incidents</span>
                </div>
                <div class="stat-box">
                    <span class="value" id="stat-near-misses">0</span>
                    <span class="label">Near Misses</span>
                </div>
                <div class="stat-box">
                    <span class="value" id="stat-alerts">0</span>
                    <span class="label">Alerts</span>
                </div>
            </div>
        </section>

    </main>

<script>
/* ──────────────────────────────────────────────────────────
   Incident table — poll every 5s
   ────────────────────────────────────────────────────────── */
function tierClass(tier) {
    if (tier === 'alert') return 'alert';
    if (tier === 'flag') return 'flag';
    return 'silent';
}

function formatTime(iso) {
    try {
        const d = new Date(iso);
        return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    } catch { return iso; }
}

function renderTable(data) {
    const tbody = document.getElementById('incident-tbody');
    if (!data || data.length === 0) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="5">No incidents recorded yet</td></tr>';
        return;
    }
    tbody.innerHTML = data.map(row => {
        const tc = tierClass(row.action_tier);
        const rowClass = row.acknowledged ? 'row-ack' : (tc === 'alert' ? 'row-alert' : (tc === 'flag' ? 'row-flag' : ''));
        const ackDisabled = row.acknowledged ? 'disabled' : '';
        const fpDisabled = row.false_positive ? 'disabled' : '';
        return `<tr class="${rowClass}" id="row-${row.id}">
            <td>${formatTime(row.timestamp)}</td>
            <td>${row.event_type}</td>
            <td><span class="severity-badge ${tc}">${Math.round(row.severity_score)} ${tc.toUpperCase()}</span></td>
            <td>${row.source_id}</td>
            <td class="actions">
                <button class="btn btn-ack" ${ackDisabled} onclick="ackIncident('${row.id}')">
                    ${row.acknowledged ? '✓ Acked' : 'Ack'}
                </button>
                <button class="btn btn-fp" ${fpDisabled} onclick="fpIncident('${row.id}')">
                    ${row.false_positive ? '✓ FP' : 'False +'}
                </button>
            </td>
        </tr>`;
    }).join('');
    document.getElementById('incident-count-badge').textContent = data.length;
}

async function fetchIncidents() {
    try {
        const resp = await fetch('/incidents?limit=50');
        const data = await resp.json();
        renderTable(data);
    } catch (err) {
        console.error('Failed to fetch incidents:', err);
    }
}

async function fetchStats() {
    try {
        const resp = await fetch('/stats');
        const data = await resp.json();
        document.getElementById('stat-incidents').textContent = data.incidents || 0;
        document.getElementById('stat-near-misses').textContent = data.near_misses || 0;
        document.getElementById('stat-alerts').textContent = data.alerts || 0;
        document.getElementById('header-incidents').textContent = data.incidents || 0;
        document.getElementById('header-alerts').textContent = data.alerts || 0;
    } catch (err) {
        console.error('Failed to fetch stats:', err);
    }
}

/* ──────────────────────────────────────────────────────────
   Actions
   ────────────────────────────────────────────────────────── */
async function ackIncident(id) {
    try {
        await fetch(`/incidents/${id}/ack`, { method: 'POST' });
        fetchIncidents();
    } catch (err) { console.error('Ack failed:', err); }
}

async function fpIncident(id) {
    try {
        await fetch(`/incidents/${id}/false-positive`, { method: 'POST' });
        fetchIncidents();
    } catch (err) { console.error('FP failed:', err); }
}

/* ──────────────────────────────────────────────────────────
   WebSocket — live events
   ────────────────────────────────────────────────────────── */
let ws = null;
let alertTimeout = null;

function connectWS() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws/events`);
    const dot = document.getElementById('ws-status');
    const label = document.getElementById('ws-label');

    ws.onopen = () => {
        dot.classList.add('connected');
        label.textContent = 'Connected';
    };
    ws.onclose = () => {
        dot.classList.remove('connected');
        label.textContent = 'Reconnecting…';
        setTimeout(connectWS, 3000);
    };
    ws.onerror = () => { ws.close(); };
    ws.onmessage = (e) => {
        try {
            const ev = JSON.parse(e.data);
            if (ev.type === 'ping') return;
            if (ev.action_tier === 'alert') {
                showAlertBanner(ev);
            }
            // Refresh table immediately on new event
            fetchIncidents();
            fetchStats();
        } catch {}
    };
}

function showAlertBanner(ev) {
    const banner = document.getElementById('alert-banner');
    const text = document.getElementById('alert-banner-text');
    text.textContent = `ALERT — ${ev.event_type || 'Incident'} detected (score ${Math.round(ev.severity_score || 0)})`;
    banner.classList.add('visible');
    if (alertTimeout) clearTimeout(alertTimeout);
    alertTimeout = setTimeout(() => banner.classList.remove('visible'), 10000);
}

/* ──────────────────────────────────────────────────────────
   Init
   ────────────────────────────────────────────────────────── */
fetchIncidents();
fetchStats();
setInterval(fetchIncidents, 5000);
setInterval(fetchStats, 10000);
connectWS();
</script>

</body>
</html>
